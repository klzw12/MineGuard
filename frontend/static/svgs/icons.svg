    <path fill="#323333" stroke="#323333" stroke-width="0.5" d="M12 2a10 10 0 0 1 10 10h-6A6 6 0 0 0 12 6z"/>
    <path fill="currentColor" stroke="#323333" stroke-width="0.5" d="M12 6a6 6 0 0 1 6 6v-6h-6z"/>
    <path fill="currentColor" stroke="#323333" stroke-width="0.5" d="M6 12h6a6 6 0 0 1-6 6V12z"/>
