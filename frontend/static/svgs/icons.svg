    <path fill="#e74c3c" stroke="#323333" stroke-width="1.5" stroke-linecap="round" d="M8 7h8M8 11h8M8 15h6"/>
    <path fill="#e74c3c" stroke="#323333" stroke-width="1.5" stroke-linecap="round" d="M3 7h1M3 11h1M3 15h1"/>
  </symbol>
  
  <symbol id="icon-reflush" viewBox="0 0 24 24">
