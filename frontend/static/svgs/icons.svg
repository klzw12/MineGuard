    <path fill="currentColor" stroke="#323333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M1 20v-6h6"/>
    <path fill="currentColor" stroke="#323333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
  </symbol>
  
  <symbol id="icon-loading" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="10" stroke="#323333" stroke-width="2.5" stroke-dasharray="62.8" stroke-dashoffset="62.8" fill="currentColor">
      <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/>
    </circle>
  </symbol>
  
  <!-- 信息图标 - 更明确的视觉提示 -->
  <symbol id="icon-message" viewBox="0 0 24 24">
    <path fill="currentColor" stroke="#323333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    <circle cx="8" cy="10" r="1" fill="currentColor" stroke="#323333" stroke-width="1.5"/>
    <circle cx="12" cy="10" r="1" fill="currentColor" stroke="#323333" stroke-width="1.5"/>
    <circle cx="16" cy="10" r="1" fill="currentColor" stroke="#323333" stroke-width="1.5"/>
  </symbol>
  
  <symbol id="icon-warn" viewBox="0 0 24 24">
    <path fill="#ffc107" stroke="#323333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
