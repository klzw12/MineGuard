mineguard:
  auth:
    enabled: true
    jwt:
      secret: ${JWT_SECRET:testjwtformineguardmineguard1bcdefghijklmnopqrstuvwxyz1234567890}
      expiration: 3600000
      enable-blacklist: true
      blacklist-prefix: "jwt:blacklist:"
      blacklist-expire: 86400
  redis:
    enabled: true
    default-expire: 3600
  mongodb:
    enabled: true
    host: "192.168.110.128"
    port: 27018
    database: "mineguard_test"
    username: "admin"
    password: "mongodbadmin"
    authentication-database: "admin"
    connect-timeout: 10000
    read-timeout: 10000
    max-connections: 50
    min-connections-per-host: 5
  websocket:
    enabled: true
    heartbeat-interval: 30000
    heartbeat-timeout: 60000
    max-connections: 100
    max-topics-per-user: 10
    max-messages-per-minute: 50
    reconnect-max-retries: 3
    offline-message-expire-days: 1
    use-encryption: false
    enable-message-persistence: false
    allowed-origins:
      - "*"

spring:
  data:
    redis:
      host: 192.168.110.128
      port: 6380
      password: testpass
      database: 0
    mongodb:
      uri: mongodb://admin:mongodbadmin@192.168.110.128:27018/mineguard_test?authSource=admin

logging:
  level:
    com.klzw: DEBUG
