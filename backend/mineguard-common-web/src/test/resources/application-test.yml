mineguard:
  web:
    enabled: true
    cors:
      allowed-origins: "*"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600
    resources:
      static-locations: "classpath:/static/"
      cache-period: 3600
    file-upload:
      max-file-size: "10MB"
      max-request-size: "100MB"
  auth:
    enabled: true
    jwt:
      secret: ${JWT_SECRET:testjwtformineguardmineguard1bcdefghijklmnopqrstuvwxyz1234567890}
      expiration: 3600000
      enable-blacklist: true
      blacklist-prefix: "jwt:blacklist:"
      blacklist-expire: 86400
  redis:
    enabled: true
    default-expire: 3600

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

spring:
  data:
    redis:
      host: 192.168.110.128
      port: 6380
      password: testpass
      database: 0

logging:
  level:
    com.klzw: DEBUG
