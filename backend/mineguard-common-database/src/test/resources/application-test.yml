# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.klzw.**.domain
  global-config:
    db-config:
      id-type: AUTO
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# MineGuard 数据库相关配置（仅用于分页插件等）
mineguard:
  database:
    mybatis-plus:
      max-limit: 100
      overflow: true
