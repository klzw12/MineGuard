# Spring Boot 标准数据源配置（用于禁用默认自动配置）
spring:
  datasource:
    url: "jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT_MASTER:3306}/mineguard_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
    username: "${MYSQL_USERNAME:root}"
    password: "${MYSQL_PASSWORD:wrong_password}"
    driver-class-name: "com.mysql.cj.jdbc.Driver"
    type: "com.alibaba.druid.pool.DruidDataSource"
  autoconfigure:
    exclude:
      - "org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration"

mineguard:
  database:
    enabled: true
    dynamic:
      enabled: true
      primary: "master"
      slaves: ["slave"]
    datasource:
      master:
        url: "jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT_MASTER:3306}/mineguard_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
        username: "${MYSQL_USERNAME:root}"
        password: "${MYSQL_PASSWORD:wrong_password}"
        driverClassName: "com.mysql.cj.jdbc.Driver"
      slave:
        url: "jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT_SLAVE:3307}/mineguard_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
        username: "${MYSQL_USERNAME:root}"
        password: "${MYSQL_PASSWORD:wrong_password}"
        driverClassName: "com.mysql.cj.jdbc.Driver"

mybatis-plus:
  configuration:
    log-impl: "org.apache.ibatis.logging.stdout.StdOutImpl"
    map-underscore-to-camel-case: true
  mapper-locations: "classpath*:mapper/**/*.xml"
  type-aliases-package: "com.klzw.**.domain"
  global-config:
    db-config:
      id-type: "assign_uuid"
      logic-delete-field: "deleted"
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    "[org.springframework,com.klzw]": DEBUG 
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
