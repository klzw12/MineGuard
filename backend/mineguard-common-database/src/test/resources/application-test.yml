mineguard:
  database:
    enabled: true
    mybatis-plus:
      overflow: true
      mapper-locations: "classpath*:mapper/**/*.xml"
      type-aliases-package: "com.klzw.**.domain"
    druid:
      initial-size: 2
      min-idle: 2
      max-active: 10
      max-wait: 60000
      validation-query: "SELECT 1"
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
    dynamic:
      enabled: true
      primary: "master"
      slaves: ["slave"]
    datasource:
      master:
        url: "jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT_MASTER:3306}/mineguard_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
        username: "${MYSQL_USERNAME:root}"
        password: "${MYSQL_PASSWORD:wrong_password}"
        driver-class-name: "com.mysql.cj.jdbc.Driver"
      slave:
        url: "jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT_SLAVE:3306}/mineguard_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
        username: "${MYSQL_USERNAME:root}"
        password: "${MYSQL_PASSWORD:wrong_password}"
        driver-class-name: "com.mysql.cj.jdbc.Driver"

spring:
  datasource:
    driver-class-name: "com.mysql.cj.jdbc.Driver"
    url: "jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT_MASTER:3306}/mineguard_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
    username: "${MYSQL_USERNAME:root}"
    password: "${MYSQL_PASSWORD:wrong_password}"

mybatis-plus:
  configuration:
    log-impl: "org.apache.ibatis.logging.stdout.StdOutImpl"
  mapper-locations: "classpath*:mapper/**/*.xml"
  type-aliases-package: "com.klzw.**.domain"

logging:
  level:
    "[org.springframework,com.klzw]": DEBUG 
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
