spring:
  application:
    name: user-service-test

  data:
    redis:
      host: "${REDIS_HOST:192.168.110.128}"
      port: ${REDIS_PORT:6380}
      password: "${REDIS_PASSWORD:testpass}"
      database: 0
      timeout: 60000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  rabbitmq:
    host: "${RABBITMQ_HOST:192.168.110.128}"
    port: ${RABBITMQ_PORT:5673}
    username: "${RABBITMQ_USERNAME:admin}"
    password: "${RABBITMQ_PASSWORD:rabbitmqadmin}"
    virtual-host: "/"

  websocket:
    enabled: true
    path: /ws/messages

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

server:
  port: 8081

mybatis-plus:
  configuration:
    log-impl: "org.apache.ibatis.logging.stdout.StdOutImpl"
    map-underscore-to-camel-case: true
  mapper-locations: "classpath*:mapper/**/*.xml"
  type-aliases-package: "com.klzw.**.domain"
  global-config:
    db-config:
      id-type: "assign_id"
      logic-delete-field: "deleted"
      logic-delete-value: 1
      logic-not-delete-value: 0

mineguard:
  database:
    enabled: true
    dynamic:
      enabled: true
      primary: "master"
      slaves: ["slave"]
    datasource:
      master:
        url: "jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT_MASTER:3306}/mineguard_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
        username: "${MYSQL_USERNAME:root}"
        password: "${MYSQL_PASSWORD:pass}"
        driverClassName: "com.mysql.cj.jdbc.Driver"
      slave:
        url: "jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT_SLAVE:3307}/mineguard_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
        username: "${MYSQL_USERNAME:root}"
        password: "${MYSQL_PASSWORD:pass}"
        driverClassName: "com.mysql.cj.jdbc.Driver"

  user:
    initadmin: true
    admin-username: admin
    admin-password: adminpass
    admin-real-name: 王敏
    admin-phone: ${PHONE}
    admin-email: admin@mineguard.com
# 考勤配置
  attendance:
    work-start-time: "09:00"            # 上班时间（格式：HH:mm）
    work-end-time: "18:00"              # 下班时间（格式：HH:mm）
    late-threshold: 15                  # 迟到阈值（分钟）
    early-leave-threshold: 15           # 早退阈值（分钟）
  auth:
    enabled: true
    jwt:
      secret: ${JWT_SECRET:testjwtformineguardmineguard1bcdefghijklmnopqrstuvwxyz1234567890}
      expiration: 3600000
      enable-blacklist: true
      blacklist-prefix: "jwt:blacklist:"
      blacklist-expire: 86400

  redis:
    enabled: true
    key-prefix: "mineguard:test:"
    default-expire: 3600

  web:
    enabled: true
    cors:
      allowed-origins: "*"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

  file:
    enabled: true
    storage:
      aliyun-oss:
        enabled: true
        endpoint: "${ALIYUN_OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}"
        access-key-id: "${ALIYUN_ACCESS_KEY_ID}"
        access-key-secret: "${ALIYUN_ACCESS_KEY_SECRET}"
        default-bucket: "${ALIYUN_OSS_BUCKET:mineguard-connectivity-test-oss}"

    ocr:
      baidu:
        enabled: true
        api-key: "${BAIDU_API_KEY}"
        secret-key: "${BAIDU_SECRET_KEY}"

  sms:
    aliyun:
      enabled: true
      access-key-id: "${ALIYUN_ACCESS_KEY_ID}"
      access-key-secret: "${ALIYUN_ACCESS_KEY_SECRET}"
      endpoint: "dypnsapi.aliyuncs.com"
      sign-name: "速通互联验证码"

  mongodb:
    enabled: true
    host: "192.168.110.128"
    port: 27018
    database: "mineguard_test"
    username: "admin"
    password: "mongodbadmin"
    authentication-database: "admin"
  mq:
    rabbit:
      enabled: true
      host: "192.168.110.128"
      port: 5673
      username: "admin"
      password: "rabbitmqadmin"
      virtual-host: "/"

logging:
  level:
    com.klzw: debug
    org.springframework: info
  charset:
    console: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
