# 薪酬配置
# 最低保障工资
mineguard.salary.min-salary=2000

# 考勤配置
# 每月工作日天数
mineguard.salary.work-days-per-month=22

# 请假阈值（天）
mineguard.salary.leave-threshold=2

# 旷工阈值（天）
mineguard.salary.absenteeism-threshold=3

# 旷工超过阈值是否禁用用户
mineguard.salary.absenteeism-disable-user=true

# 全勤奖
mineguard.salary.full-attendance-bonus=500

# 加班倍率
mineguard.salary.overtime-rate=1.5

# 迟到早退扣除率
mineguard.salary.late-early-leave-deduction-rate=1.0

# 请假扣除率
mineguard.salary.leave-deduction-rate=1.0

# 薪酬计算缓存过期时间（小时）
mineguard.salary.salary-calculate-cache-expire=24

# 薪酬计算定时器配置
mineguard.salary.salary-calculate-cron=0 0 2 1 * ?

# 薪酬记录清理定时器配置
mineguard.salary.salary-clean-cron=0 0 3 * * ?

# 薪酬记录保留时间（天）
mineguard.salary.salary-record-keep-days=365
