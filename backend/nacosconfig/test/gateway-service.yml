spring:
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes: 
            - id: user-service 
              uri: lb://user-service
              predicates: 
                - Path=/api/user/** 
              filters: 
                - StripPrefix=1 

            - id: user-service-auth 
              uri: lb://user-service
              predicates: 
                - Path=/api/auth/** 
              filters: 
                - StripPrefix=1 

            - id: qualification-service 
              uri: lb://user-service
              predicates: 
                - Path=/api/qualification/** 
              filters: 
                - StripPrefix=1 

            - id: role-service 
              uri: lb://user-service
              predicates: 
                - Path=/api/role/** 
              filters: 
                - StripPrefix=1 

            - id: message-service 
              uri: lb://user-service
              predicates: 
                - Path=/api/messages/** 
              filters: 
                - StripPrefix=1 

            - id: attendance-service 
              uri: lb://user-service
              predicates: 
                - Path=/api/attendance/** 
              filters: 
                - StripPrefix=1 

            - id: vehicle-service 
              uri: lb://vehicle-service
              predicates: 
                - Path=/api/vehicle/** 
              filters: 
                - StripPrefix=1 

            - id: trip-service 
              uri: lb://trip-service
              predicates: 
                - Path=/api/trip/** 
              filters: 
                - StripPrefix=1 

            - id: warning-service 
              uri: lb://warning-service
              predicates: 
                - Path=/api/warning/** 
              filters: 
                - StripPrefix=1 

            - id: statistics-service 
              uri: lb://statistics-service
              predicates: 
                - Path=/api/statistics/** 
              filters: 
                - StripPrefix=1 

            - id: dispatch-service 
              uri: lb://dispatch-service
              predicates: 
                - Path=/api/dispatch/** 
              filters: 
                - StripPrefix=1 

            - id: cost-service 
              uri: lb://cost-service
              predicates: 
                - Path=/api/cost/** 
              filters: 
                - StripPrefix=1 

            - id: ai-service 
              uri: lb://ai-service
              predicates: 
                - Path=/api/ai/** 
              filters: 
                - StripPrefix=1 

            - id: python-service 
              uri: lb://python-service
              predicates: 
                - Path=/api/python/** 
              filters: 
                - StripPrefix=1
 
mineguard: 
  gateway: 
    cors: 
      allowed-origins: "http://127.0.0.1:5173,http://127.0.0.1:8080" 
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS" 
      allowed-headers: "*" 
      allow-credentials: true 
      max-age: 3600 
    enable-rate-limit: true 
    rate-limit-count: 2000 
    rate-limit-time: 60 
    enable-circuit-breaker: true 
    ignore-auth: 
      paths: 
        - "/api/auth/login" 
        - "/api/auth/register" 
        - "/api/auth/reset-password" 
        - "/api/public/" 
        - "/actuator/" 
        - "/swagger-ui/" 
        - "/v3/api-docs/" 

logging: 
  level: 
    com.klzw: debug
    org.springframework.cloud.gateway: debug
