# 核心模块配置 - 测试环境
mineguard:
  pagination:
    enabled: true
    default-page: 1
    default-page-size: 10
    max-page-size: 100
    default-sort-order: asc

# Spring 全局配置
spring:
  messages:
    basename: "i18n/messages"
    encoding: "UTF-8"
  task:
    execution:
      pool:
        core-size: 10
        max-size: 50
        queue-capacity: 1000
        keep-alive: "60s"

# 日志配置 - 测试环境使用debug级别
logging:
  level:
    com.klzw: debug
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: "logs/application.log"
    max-size: "10MB"
    max-history: "7"