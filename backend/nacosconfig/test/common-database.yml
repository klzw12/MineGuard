# 数据库模块配置 - 测试环境
mineguard:
  database:
    enabled: true
    dynamic:
      enabled: true
      primary: "master"
      slaves: ["slave"]
    datasource:
      master:
        url: "jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT_MASTER:3306}/mineguard_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
        username: "${MYSQL_USERNAME:root}"
        password: "${MYSQL_PASSWORD:1.qwklzw}"
        driverClassName: "com.mysql.cj.jdbc.Driver"
      slave:
        url: "jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT_SLAVE:3307}/mineguard_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
        username: "${MYSQL_USERNAME:root}"
        password: "${MYSQL_PASSWORD:1.qwklzw}"
        driverClassName: "com.mysql.cj.jdbc.Driver"

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: "org.apache.ibatis.logging.stdout.StdOutImpl"
    map-underscore-to-camel-case: true
  mapper-locations: "classpath*:mapper/**/*.xml"
  type-aliases-package: "com.klzw.**.domain"
  global-config:
    db-config:
      id-type: "assign_uuid"
      logic-delete-field: "deleted"
      logic-delete-value: 1
      logic-not-delete-value: 0