mineguard:
  web:
    enabled: true
    cors:
      allowed-origins: "*"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600
    resources:
      static-locations: "classpath:/static/"
      cache-period: 3600
    file-upload:
      max-file-size: "10MB"
      max-request-size: "100MB"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true