# Redis模块配置
mineguard:
  redis:
    enabled: true
    key-prefix: "mineguard:"
    default-expire: 3600
    lock:
      default-expire: 30
      retry-count: 3
      retry-interval: 100
    rate-limit:
      default-window: 60
      default-limit: 100
    redisson:
      enabled: true
      retry-attempts: 3
      retry-interval: 1000
      connect-timeout: 30000

# Redis连接配置
spring:
  data:
    redis:
      host: 192.168.110.128
      port: 6380
      password: testpass
      database: 0
      timeout: 60000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0