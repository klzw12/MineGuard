server:
  port: 8084

spring:
  application:
    name: warning-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/MineGuard?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.klzw: debug
    org.springframework: info

knife4j:
  enable: true
  setting:
    language: zh_cn

warning:
  notify:
    sms-enabled: false
    push-enabled: true
