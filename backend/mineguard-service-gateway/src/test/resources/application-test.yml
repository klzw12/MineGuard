server:
  port: 8080

spring:
  application:
    name: gateway-service-test
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_IP:192.168.110.128}:8848
      username: tester
      password: testpass
      discovery:
        namespace: test
        group: Service_Test
      config:
        namespace: test
        group: Service_Test
  config:
    import:
      - nacos:gateway-service.yml?group=Service_Test&refresh=true
      - nacos:common-core.yml?group=Shared_Test&refresh=true
      - nacos:common-auth.yml?group=Shared_Test&refresh=true
      - nacos:common-redis.yml?group=Shared_Test&refresh=true
