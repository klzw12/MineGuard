# 测试环境配置
# 服务器IP: 192.168.110.128
# Docker内部网络: 192.168.111.x (由docker-compose-test.yml管理)

# Nacos配置中心（测试环境可能不使用Nacos，使用本地配置）
nacos:
  server-addr: 192.168.110.128:8848
  namespace: test
  group: gateway-service

# Redis配置（端口映射到宿主机6380）
redis:
  host: 192.168.110.128
  port: 6380
  password: testpass
  database: 0
  timeout: 3000

# JWT配置（从application-secret.yml获取）
jwt:
  secret: mineguardjwtsecretkey1234abcdefjhigklmn1234klzwsecretkey
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

# 网关配置
mineguard:
  gateway:
    # 限流配置
    enable-rate-limit: true
    rate-limit-count: 500
    rate-limit-time: 60
    # 熔断配置
    enable-circuit-breaker: true
    # CORS配置
    cors:
      allowed-origins: "*"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "Content-Type,Authorization,X-Trace-Id,X-User-Id,X-Username,X-User-Roles"
      allow-credentials: true
      max-age: 3600
    # 忽略认证路径
    ignore-auth:
      paths:
        - /api/auth/login
        - /api/auth/register
        - /api/auth/captcha
        - /api/auth/refresh
        - /swagger-ui
        - /v3/api-docs
        - /webjars
        - /doc.html
        - /favicon.ico
        - /actuator/health

# 日志配置
logging:
  level:
    com.klzw.service.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    com.klzw.common.auth: DEBUG
  file:
    name: /var/log/mineguard/gateway-service-test.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# 监控配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
