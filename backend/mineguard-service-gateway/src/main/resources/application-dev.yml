spring:
  cloud:
    nacos:
      server-addr: ${SERVER_IP:192.168.110.128}:8848
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE:dev}
        group: Service_Dev
      config:
        namespace: ${NACOS_NAMESPACE:dev}
        group: Service_Dev  
  config:
    import:
      - nacos:gateway-service.yml?group=Service_Dev&refresh=true
      - nacos:common-core.yml?group=Shared_Dev&refresh=true
      - nacos:common-auth.yml?group=Shared_Dev&refresh=true
      - nacos:common-redis.yml?group=Shared_Dev&refresh=true
