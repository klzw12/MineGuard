# JWT配置
jwt:
  secret: ${JWT_SECRET:mineguard-secret-key-for-jwt-token-generation-and-validation}
  expiration: ${JWT_EXPIRATION:86400000}
  header: ${JWT_HEADER:Authorization}
  prefix: ${JWT_PREFIX:Bearer }

# 网关配置
mineguard:
  gateway:
    cors:
      allowed-origins: ${GATEWAY_CORS_ORIGINS:*}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: Content-Type,Authorization,X-Trace-Id
      allow-credentials: true
      max-age: 3600
    ignore-auth:
      paths:
        - /api/auth/login
        - /api/auth/register
        - /api/auth/captcha
        - /api/auth/refresh
        - /swagger-ui
        - /v3/api-docs
        - /webjars
        - /doc.html
        - /favicon.ico
